<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 320px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 16px; }
    h2 { font-size: 15px; margin-bottom: 12px; color: #fff; }
    .status { background: #16213e; border-radius: 8px; padding: 12px; margin-bottom: 12px; font-size: 13px; line-height: 1.6; }
    .status .label { color: #8892b0; }
    .status .value { color: #64ffda; font-family: monospace; }
    .status .error { color: #ff6b6b; }
    .settings { margin-bottom: 12px; }
    .settings label { display: block; font-size: 12px; color: #8892b0; margin-bottom: 4px; }
    .settings input { width: 100%; padding: 6px 8px; border: 1px solid #333; border-radius: 4px; background: #0f0f23; color: #e0e0e0; font-size: 12px; font-family: monospace; margin-bottom: 8px; }
    .btn { width: 100%; padding: 8px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.85; }
    .btn-sync { background: #4CAF50; color: #fff; margin-bottom: 8px; }
    .btn-save { background: #2196F3; color: #fff; }
    .btn:disabled { opacity: 0.5; cursor: wait; }
  </style>
</head>
<body>
  <h2>🍪 Gemini Cookie Sync</h2>

  <div class="status" id="status">Loading...</div>

  <div class="settings">
    <label>API URL</label>
    <input type="text" id="apiUrl">
    <label>Password</label>
    <input type="password" id="password">
    <label>Push interval (minutes)</label>
    <input type="number" id="interval" min="1" max="1440">
    <label>Pull interval (minutes)</label>
    <input type="number" id="pullInterval" min="1" max="60">
  </div>

  <button class="btn btn-sync" id="syncBtn">⚡ Sync Now</button>
  <button class="btn btn-save" id="saveBtn">💾 Save Settings</button>

  <script src="popup.js"></script>
</body>
</html>
